<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おかげさま — チェックイン</title>
<style>
 :root {
   --warm: #F4845F;
   --warm-light: #FFF0EB;
   --green: #4A7C59;
   --green-light: #E8F5E9;
   --cream: #FFF8F0;
   --text: #2D2D2D;
   --text-light: #666;
   --border: #E0D5C9;
   --shadow: rgba(0,0,0,0.08);
 }


 * { margin: 0; padding: 0; box-sizing: border-box; }


 body {
   font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", -apple-system, sans-serif;
   background: var(--cream);
   color: var(--text);
   min-height: 100vh;
 }


 /* Navigation */
 nav {
   background: white;
   border-bottom: 2px solid var(--border);
   padding: 12px 20px;
   display: flex;
   gap: 8px;
   align-items: center;
   position: sticky;
   top: 0;
   z-index: 100;
   box-shadow: 0 2px 8px var(--shadow);
 }
 nav button {
   padding: 10px 20px;
   border: 2px solid var(--border);
   border-radius: 24px;
   background: white;
   font-size: 16px;
   cursor: pointer;
   transition: all 0.2s;
   white-space: nowrap;
 }
 nav button:hover { background: var(--warm-light); }
 nav button.active {
   background: var(--warm);
   color: white;
   border-color: var(--warm);
 }
 .nav-title {
   font-size: 20px;
   font-weight: 700;
   margin-right: auto;
   color: var(--warm);
 }
 .nav-admin-link {
   margin-left: auto;
   font-size: 13px;
   color: var(--text-light);
   text-decoration: none;
   padding: 6px 12px;
   border-radius: 12px;
   border: 1px solid var(--border);
   white-space: nowrap;
 }
 .nav-admin-link:hover {
   background: var(--green-light);
   color: var(--green);
   border-color: var(--green);
 }


 /* Views */
 .view { display: none; padding: 24px; max-width: 800px; margin: 0 auto; }
 .view.active { display: block; }


 /* Check-in View */
 .checkin-header {
   text-align: center;
   margin-bottom: 32px;
 }
 .checkin-header h1 {
   font-size: 28px;
   color: var(--warm);
   margin-bottom: 4px;
 }
 .checkin-header p {
   color: var(--text-light);
   font-size: 16px;
 }
 .gathering-select {
   margin-bottom: 24px;
 }
 .gathering-select label {
   display: block;
   font-size: 14px;
   color: var(--text-light);
   margin-bottom: 8px;
 }
 .gathering-select select {
   width: 100%;
   padding: 14px;
   font-size: 18px;
   border: 2px solid var(--border);
   border-radius: 12px;
   background: white;
   appearance: auto;
 }
 .member-grid {
   display: grid;
   grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
   gap: 12px;
   margin-top: 16px;
 }
 .member-card {
   background: white;
   border: 2px solid var(--border);
   border-radius: 16px;
   padding: 20px 12px;
   text-align: center;
   cursor: pointer;
   transition: all 0.2s;
 }
 .member-card:hover {
   border-color: var(--warm);
   transform: translateY(-2px);
   box-shadow: 0 4px 12px var(--shadow);
 }
 .member-card.checked-in {
   border-color: var(--green);
   background: var(--green-light);
 }
 .member-avatar {
   width: 56px;
   height: 56px;
   border-radius: 50%;
   background: var(--warm-light);
   display: flex;
   align-items: center;
   justify-content: center;
   font-size: 24px;
   margin: 0 auto 10px;
 }
 .member-card.checked-in .member-avatar {
   background: var(--green);
   color: white;
 }
 .member-name {
   font-size: 18px;
   font-weight: 600;
 }
 .member-status {
   font-size: 12px;
   color: var(--text-light);
   margin-top: 4px;
 }


 /* Thank-you Modal */
 .modal-overlay {
   display: none;
   position: fixed;
   top: 0; left: 0; right: 0; bottom: 0;
   background: rgba(0,0,0,0.5);
   z-index: 200;
   align-items: center;
   justify-content: center;
   padding: 20px;
 }
 .modal-overlay.active { display: flex; }
 .modal {
   background: white;
   border-radius: 20px;
   padding: 32px 24px;
   max-width: 500px;
   width: 100%;
   max-height: 90vh;
   overflow-y: auto;
 }
 .modal h2 {
   font-size: 22px;
   text-align: center;
   margin-bottom: 4px;
   color: var(--warm);
 }
 .modal .subtitle {
   text-align: center;
   color: var(--text-light);
   margin-bottom: 24px;
   font-size: 14px;
 }
 .thank-list {
   display: flex;
   flex-direction: column;
   gap: 8px;
   margin-bottom: 20px;
 }
 .thank-option {
   padding: 14px 16px;
   border: 2px solid var(--border);
   border-radius: 12px;
   cursor: pointer;
   font-size: 17px;
   transition: all 0.2s;
   display: flex;
   align-items: center;
   gap: 12px;
 }
 .thank-option:hover { border-color: var(--warm); background: var(--warm-light); }
 .thank-option.selected { border-color: var(--warm); background: var(--warm-light); }
 .thank-option .mini-avatar {
   width: 36px;
   height: 36px;
   border-radius: 50%;
   background: var(--warm-light);
   display: flex;
   align-items: center;
   justify-content: center;
   font-size: 16px;
   flex-shrink: 0;
 }
 .message-input {
   width: 100%;
   padding: 14px;
   border: 2px solid var(--border);
   border-radius: 12px;
   font-size: 16px;
   font-family: inherit;
   resize: none;
   margin-bottom: 16px;
 }
 .message-input:focus { outline: none; border-color: var(--warm); }
 .btn {
   display: block;
   width: 100%;
   padding: 16px;
   border: none;
   border-radius: 12px;
   font-size: 18px;
   font-weight: 600;
   cursor: pointer;
   transition: all 0.2s;
 }
 .btn-primary { background: var(--warm); color: white; }
 .btn-primary:hover { background: #e0734f; }
 .btn-secondary {
   background: white;
   color: var(--text-light);
   border: 2px solid var(--border);
   margin-top: 8px;
 }
 .btn-secondary:hover { background: var(--warm-light); }


 /* Success */
 .success-message {
   text-align: center;
   padding: 40px 20px;
 }
 .success-message .big-check {
   font-size: 64px;
   margin-bottom: 16px;
 }
 .success-message h2 {
   color: var(--green);
   margin-bottom: 8px;
 }


 /* Letter View */
 .letter-select {
   margin-bottom: 24px;
 }
 .letter-select select {
   width: 100%;
   padding: 14px;
   font-size: 18px;
   border: 2px solid var(--border);
   border-radius: 12px;
   background: white;
 }
 .letter-card {
   background: white;
   border: 3px solid var(--warm);
   border-radius: 20px;
   padding: 40px 32px;
   max-width: 600px;
   margin: 0 auto;
   position: relative;
 }
 .letter-card::before {
   content: '';
   position: absolute;
   top: 8px; left: 8px; right: 8px; bottom: 8px;
   border: 1px solid var(--border);
   border-radius: 14px;
   pointer-events: none;
 }
 .letter-dear {
   font-size: 22px;
   color: var(--warm);
   margin-bottom: 20px;
   font-weight: 600;
 }
 .letter-body {
   font-size: 16px;
   line-height: 1.8;
   color: var(--text);
   margin-bottom: 24px;
 }
 .letter-quotes {
   margin-bottom: 24px;
 }
 .letter-quote {
   background: var(--warm-light);
   border-radius: 12px;
   padding: 14px 16px;
   margin-bottom: 8px;
   font-size: 15px;
   border-left: 4px solid var(--warm);
 }
 .letter-quote .from {
   font-size: 13px;
   color: var(--text-light);
   margin-top: 6px;
 }
 .letter-sign {
   text-align: right;
   color: var(--text-light);
   font-size: 14px;
 }
 .letter-stats {
   display: flex;
   justify-content: center;
   gap: 24px;
   margin-top: 24px;
   padding-top: 20px;
   border-top: 1px solid var(--border);
 }
 .letter-stat {
   text-align: center;
 }
 .letter-stat-num {
   font-size: 28px;
   font-weight: 700;
   color: var(--warm);
 }
 .letter-stat-label {
   font-size: 12px;
   color: var(--text-light);
 }
 .no-letter {
   text-align: center;
   color: var(--text-light);
   padding: 60px 20px;
   font-size: 16px;
 }


 /* ── Touch & Focus ── */
 .member-card, .thank-option, nav button, .btn, .nav-admin-link {
   touch-action: manipulation;
   -webkit-tap-highlight-color: transparent;
 }
 :focus-visible {
   outline: 3px solid var(--warm);
   outline-offset: 2px;
   border-radius: 4px;
 }
 .message-input:focus {
   outline: none;
   border-color: var(--warm);
   box-shadow: 0 0 0 3px rgba(244,132,95,0.25);
 }
 /* Minimum 44 px touch targets */
 nav button { min-height: 44px; }
 .nav-admin-link { min-height: 44px; display: flex; align-items: center; }
 .btn { min-height: 48px; }
 .thank-option { min-height: 52px; }

 @media (max-width: 600px) {
   nav { flex-wrap: wrap; padding: 10px 14px; gap: 6px; }
   nav button { padding: 10px 16px; font-size: 15px; }
   .nav-title { font-size: 17px; }
   .checkin-header h1 { font-size: 24px; }
   .member-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
   .member-card { padding: 16px 10px; }
   .member-avatar { width: 52px; height: 52px; font-size: 22px; }
   .modal { padding: 24px 16px; }
   .letter-card { padding: 24px 16px; }
   .letter-stats { gap: 16px; }
 }
 @media (max-width: 360px) {
   nav button { padding: 8px 12px; font-size: 14px; }
   .member-name { font-size: 15px; }
 }

 /* Screen-reader only utility */
 .sr-only {
   position: absolute; width: 1px; height: 1px;
   padding: 0; margin: -1px; overflow: hidden;
   clip: rect(0,0,0,0); white-space: nowrap; border: 0;
 }
</style>
</head>
<body>


<nav aria-label="メインナビ">
 <span class="nav-title">おかげさま</span>
 <button class="active" onclick="showView('checkin')">チェックイン</button>
 <button onclick="showView('letter')">感謝の手紙</button>
 <a href="../manager/" class="nav-admin-link">管理者へ</a>
</nav>


<!-- CHECK-IN VIEW -->
<div id="view-checkin" class="view active">
 <div class="checkin-header">
   <h1>今日のチェックイン</h1>
   <p>カードをタップ、またはお名前を選んでください</p>
 </div>


 <div class="gathering-select">
   <label>今日の集まり / Today's Gathering</label>
   <select id="gathering-type">
     <option value="radio">ラジオ体操 (Radio Taisou)</option>
     <option value="salon">いこいのサロン (Ikoi no Salon)</option>
     <option value="shokudo">こども食堂 (Kodomo Shokudo)</option>
     <option value="chonaikai">町内会 (Chonaikai Meeting)</option>
     <option value="other">その他 (Other)</option>
   </select>
 </div>


 <p style="font-size:14px; color:var(--text-light); margin-bottom:12px;">参加者を選んでください / Tap to check in:</p>
 <div class="member-grid" id="member-grid"></div>
</div>


<!-- THANK YOU MODAL -->
<div class="modal-overlay" id="thank-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
 <div class="modal" id="modal-content"></div>
</div>


<!-- LETTER VIEW -->
<div id="view-letter" class="view">
 <div class="checkin-header">
   <h1>おかげさまの手紙</h1>
   <p>Monthly Okage-sama Letter</p>
 </div>


 <div class="letter-select">
   <select id="letter-person" onchange="renderLetter()">
     <option value="">お名前を選んでください...</option>
   </select>
 </div>


 <div id="letter-output"></div>
</div>


<script src="../config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── DATA ──
const SUPABASE_TABLE = 'reviews';
const SUPABASE_CHECKINS_TABLE = 'checkins';


const supabaseClient = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
 ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
 : null;


const DEFAULT_MEMBERS = [
 { id: 'tanaka', name: '田中さん', emoji: '👵', nameEn: 'Tanaka-san' },
 { id: 'yamada', name: '山田さん', emoji: '👴', nameEn: 'Yamada-san' },
 { id: 'suzuki', name: '鈴木さん', emoji: '👵', nameEn: 'Suzuki-san' },
 { id: 'sato',   name: '佐藤さん', emoji: '👴', nameEn: 'Satō-san' },
 { id: 'ito',    name: '伊藤さん', emoji: '👵', nameEn: 'Itō-san' },
 { id: 'watanabe', name: '渡辺さん', emoji: '👴', nameEn: 'Watanabe-san' },
 { id: 'takahashi', name: '高橋さん', emoji: '👵', nameEn: 'Takahashi-san' },
 { id: 'kobayashi', name: '小林さん', emoji: '👴', nameEn: 'Kobayashi-san' },
];


let MEMBERS = [];
let storeCache = { checkins: [], thanks: [] };
const LOCAL_KEY = 'okagesama';


const SAMPLE_MESSAGES = [
 'いつもお漬物ありがとうございます',
 '体操を教えてくれてありがとう',
 '話を聞いてくれてありがとう',
 'いつも笑顔をありがとう',
 '一緒に歩いてくれてありがとう',
 'お花を持ってきてくれてありがとう',
 'いつも声をかけてくれてありがとう',
 '料理を分けてくれてありがとう',
 '相談に乗ってくれてありがとう',
 'いつも元気をもらっています',
];


const GATHERING_NAMES = {
 radio: 'ラジオ体操',
 salon: 'いこいのサロン',
 shokudo: 'こども食堂',
 chonaikai: '町内会',
 other: 'その他',
};


function getStore() {
 const raw = localStorage.getItem(LOCAL_KEY);
 if (raw) return JSON.parse(raw);
 // Seed demo data
 const seed = { checkins: [], thanks: [] };
 const now = Date.now();
 const day = 86400000;
 const gatherings = ['radio','salon','chonaikai','shokudo'];
 // Generate ~30 days of demo data
 for (let d = 30; d >= 1; d--) {
   const date = new Date(now - d * day).toISOString().split('T')[0];
   // 1-2 gatherings per day on some days
   if (d % 2 === 0 || d % 3 === 0) {
     const g = gatherings[d % gatherings.length];
     // 4-6 random attendees
     const shuffled = [...DEFAULT_MEMBERS].sort(() => Math.random() - 0.5);
     const count = 4 + Math.floor(Math.random() * 3);
     const attendees = shuffled.slice(0, count);
     attendees.forEach(m => {
       seed.checkins.push({ memberId: m.id, gathering: g, date, ts: now - d * day + Math.random() * 3600000 });
     });
     // 2-4 thanks per gathering
     const thanksCount = 2 + Math.floor(Math.random() * 3);
     for (let t = 0; t < thanksCount; t++) {
       const from = attendees[Math.floor(Math.random() * attendees.length)];
       let to = attendees[Math.floor(Math.random() * attendees.length)];
       while (to.id === from.id) to = attendees[Math.floor(Math.random() * attendees.length)];
       seed.thanks.push({
         fromId: from.id,
         toId: to.id,
         message: SAMPLE_MESSAGES[Math.floor(Math.random() * SAMPLE_MESSAGES.length)],
         gathering: g,
         date,
         ts: now - d * day + Math.random() * 3600000,
       });
     }
   }
 }
 localStorage.setItem(LOCAL_KEY, JSON.stringify(seed));
 return seed;
}


function saveStore(store) {
 localStorage.setItem(LOCAL_KEY, JSON.stringify(store));
}


function getMember(id) {
 return MEMBERS.find(m => m.id === id);
}


function memberIdFromName(name) {
 if (!name) return '';
 return name.trim().toLowerCase().replace(/\s+/g, '-');
}


function toTsMs(value) {
 if (!value) return 0;
 return typeof value === 'number' ? value : new Date(value).getTime();
}


function normalizeCheckin(row) {
 return {
   memberId: row.member_id || row.memberId,
   gathering: row.gathering,
   date: row.date,
   ts: row.ts,
 };
}


function normalizeThanks(row) {
 let parsed = null;
 if (row.description) {
   try {
     parsed = JSON.parse(row.description);
   } catch (e) {
     parsed = null;
   }
 }
 const toName = (parsed && parsed.toName) ? parsed.toName : (row.name || '');
 const fromName = (parsed && parsed.fromName) ? parsed.fromName : '参加者';
 const message = (parsed && parsed.message) ? parsed.message : (row.description || '');
 const tsValue = row.created_at || row.updated_at || row.ts;
 const dateValue = tsValue ? new Date(tsValue).toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
 return {
   fromId: (parsed && parsed.fromId) ? parsed.fromId : memberIdFromName(fromName),
   toId: (parsed && parsed.toId) ? parsed.toId : memberIdFromName(toName),
   fromName,
   toName,
   message,
   gathering: row.event_name || row.gathering || 'other',
   date: dateValue,
   ts: tsValue,
 };
}


function buildMembersFromStore(store) {
 const map = new Map();
 DEFAULT_MEMBERS.forEach(m => map.set(m.id, { ...m }));
 store.thanks.forEach(t => {
   if (t.fromName) {
     const id = t.fromId || memberIdFromName(t.fromName);
     if (id && !map.has(id)) {
       map.set(id, { id, name: t.fromName, emoji: '🙂', nameEn: t.fromName });
     }
   }
   if (t.toName) {
     const id = t.toId || memberIdFromName(t.toName);
     if (id && !map.has(id)) {
       map.set(id, { id, name: t.toName, emoji: '🙂', nameEn: t.toName });
     }
   }
 });
 MEMBERS = Array.from(map.values());
 return MEMBERS;
}


async function fetchStore() {
 if (!supabaseClient) {
   storeCache = getStore();
   return storeCache;
 }
 const localStore = getStore();
 const [checkinsResult, thanksResult] = await Promise.all([
   supabaseClient
     .from(SUPABASE_CHECKINS_TABLE)
     .select('*')
     .order('created_at', { ascending: false })
     .limit(500),
   supabaseClient
     .from(SUPABASE_TABLE)
     .select('*')
     .order('created_at', { ascending: false })
     .limit(500),
 ]);
 const checkins = checkinsResult.error
   ? localStore.checkins.map(normalizeCheckin)
   : (checkinsResult.data || []).map(normalizeCheckin);
 const thanks = thanksResult.error
   ? localStore.thanks
   : (thanksResult.data || []).map(normalizeThanks);
 storeCache = { checkins, thanks };
 buildMembersFromStore(storeCache);
 return storeCache;
}


async function addCheckin(memberId, gathering) {
 const today = new Date().toISOString().split('T')[0];
 const ts = new Date().toISOString();
 const store = getStore();
 store.checkins.push({ memberId, gathering, date: today, ts: Date.now() });
 saveStore(store);
 storeCache.checkins = store.checkins;
 if (supabaseClient) {
   const { error } = await supabaseClient
     .from(SUPABASE_CHECKINS_TABLE)
     .insert({ member_id: memberId, gathering, date: today, created_at: ts });
   if (error) console.warn('Supabase checkin save error:', error);
 }
}


async function addThanks(fromId, toId, message, gathering) {
 const today = new Date().toISOString().split('T')[0];
 const ts = new Date().toISOString();
 const fromMember = getMember(fromId);
 const toMember = getMember(toId);
 const fromName = fromMember ? fromMember.name : '参加者';
 const toName = toMember ? toMember.name : toId;
 if (!supabaseClient) {
   const store = getStore();
   store.thanks.push({ fromId, toId, fromName, toName, message, gathering, date: today, ts: Date.now() });
   saveStore(store);
   storeCache = store;
   return;
 }
 const payload = {
   name: toName,
   description: JSON.stringify({ fromId, fromName, toId, toName, message }),
   event_name: gathering,
   created_at: ts,
   updated_at: ts,
 };
 const { data, error } = await supabaseClient.from(SUPABASE_TABLE).insert(payload).select().single();
 if (!error && data) {
   const normalized = normalizeThanks(data);
   storeCache.thanks.push(normalized);
   buildMembersFromStore(storeCache);
 }
}


// ── VIEWS ──
async function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.remove('active');
    const viewMap = { checkin: 0, letter: 1 };
    b.classList.toggle('active', i === viewMap[name]);
  });
  if (name === 'letter') await renderLetterSelect();
}


// ── CHECK-IN ──
let todayCheckedIn = new Set();


function renderCheckinGrid() {
 const grid = document.getElementById('member-grid');
 grid.innerHTML = MEMBERS.map(m => `
   <div class="member-card ${todayCheckedIn.has(m.id) ? 'checked-in' : ''}"
     role="button" tabindex="0"
     aria-pressed="${todayCheckedIn.has(m.id)}"
     aria-label="${m.name}${todayCheckedIn.has(m.id) ? ' チェックイン済み' : ''}"
     onclick="handleCheckin('${m.id}')"
     onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();handleCheckin('${m.id}');}">
     <div class="member-avatar" aria-hidden="true">${todayCheckedIn.has(m.id) ? '✓' : m.emoji}</div>
     <div class="member-name">${m.name}</div>
     <div class="member-status">${todayCheckedIn.has(m.id) ? 'チェックイン済み' : 'タップしてね'}</div>
   </div>
 `).join('');
}


async function handleCheckin(memberId) {
 if (todayCheckedIn.has(memberId)) return;
 const gathering = document.getElementById('gathering-type').value;
 await addCheckin(memberId, gathering);
 todayCheckedIn.add(memberId);
 renderCheckinGrid();
 showThankModal(memberId);
}


// ── THANK MODAL ──
let selectedThankee = null;


function showThankModal(checkerId) {
 selectedThankee = null;
 const checker = getMember(checkerId);
 const others = MEMBERS.filter(m => m.id !== checkerId);
 const modal = document.getElementById('modal-content');
 modal.innerHTML = `
   <h2 id="modal-title">今日、誰に感謝しますか？</h2>
   <p class="subtitle">${checker.name}、今日は誰のおかげですか？</p>
   <div class="thank-list" role="listbox" aria-label="感謝する人を選んでください">
     ${others.map(m => `
       <div class="thank-option" id="opt-${m.id}"
         role="option" tabindex="0"
         aria-selected="false"
         onclick="selectThankee('${m.id}')"
         onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();selectThankee('${m.id}');}">
         <div class="mini-avatar" aria-hidden="true">${m.emoji}</div>
         <span>${m.name}</span>
       </div>
     `).join('')}
   </div>
   <label for="thank-message" class="sr-only">感謝のメッセージ</label>
   <textarea class="message-input" id="thank-message" rows="2" placeholder="ひとこと感謝のメッセージ（任意）"></textarea>
   <button type="button" class="btn btn-primary" onclick="submitThanks('${checkerId}')">ありがとうを送る</button>
   <button type="button" class="btn btn-secondary" onclick="closeModal()">今日はスキップ</button>
 `;
 document.getElementById('thank-modal').classList.add('active');
}


function selectThankee(id) {
 selectedThankee = id;
 document.querySelectorAll('.thank-option').forEach(el => {
   el.classList.remove('selected');
   el.setAttribute('aria-selected', 'false');
 });
 const opt = document.getElementById('opt-' + id);
 opt.classList.add('selected');
 opt.setAttribute('aria-selected', 'true');
}


async function submitThanks(fromId) {
 if (!selectedThankee) {
   closeModal();
   return;
 }
 const message = document.getElementById('thank-message').value.trim() ||
   SAMPLE_MESSAGES[Math.floor(Math.random() * SAMPLE_MESSAGES.length)];
 const gathering = document.getElementById('gathering-type').value;
 await addThanks(fromId, selectedThankee, message, gathering);


 const to = getMember(selectedThankee);
 const modal = document.getElementById('modal-content');
 modal.innerHTML = `
   <div class="success-message">
     <div class="big-check">${to.emoji}</div>
     <h2>ありがとうを送りました！</h2>
     <p style="color:var(--text-light); margin-top:8px;">${to.name}に感謝が届きました</p>
     <button type="button" class="btn btn-primary" style="margin-top:24px;" onclick="closeModal()">もどる</button>
   </div>
 `;
}


function closeModal() {
 document.getElementById('thank-modal').classList.remove('active');
}


// ── LETTER ──
async function renderLetterSelect() {
 const sel = document.getElementById('letter-person');
 sel.innerHTML = '<option value="">お名前を選んでください...</option>' +
   MEMBERS.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
 renderLetter();
}


async function renderLetter() {
 const id = document.getElementById('letter-person').value;
 const output = document.getElementById('letter-output');
 if (!id) {
   output.innerHTML = '<div class="no-letter">感謝の手紙を見る方を選んでください</div>';
   return;
 }
 const store = await fetchStore();
 const member = getMember(id);
 if (!member) {
   output.innerHTML = '<div class="no-letter">感謝の手紙を見る方を選んでください</div>';
   return;
 }
 const now = Date.now();
 const thirtyDays = 30 * 86400000;


 const received = store.thanks.filter(t => t.toId === id && (now - toTsMs(t.ts)) < thirtyDays);
 const sent = store.thanks.filter(t => t.fromId === id && (now - toTsMs(t.ts)) < thirtyDays);
 const checkins = store.checkins.filter(c => c.memberId === id && (now - toTsMs(c.ts)) < thirtyDays);
 const uniqueFrom = new Set(received.map(t => t.fromId)).size;


 const month = new Date().getMonth() + 1;


 if (received.length === 0) {
   output.innerHTML = `
     <div class="letter-card">
       <div class="letter-dear">${member.name}へ</div>
       <div class="letter-body">今月はまだ感謝の記録がありません。でも、あなたがここにいてくれるだけで、みんなの力になっています。</div>
       <div class="letter-sign">おかげさまより — ${month}月</div>
     </div>
   `;
   return;
 }


 // Pick up to 4 unique quotes
 const uniqueQuotes = [];
 const seenFrom = new Set();
 for (const t of received) {
   if (!seenFrom.has(t.fromId) && t.message) {
     const from = getMember(t.fromId) || { name: t.fromName || '参加者' };
     uniqueQuotes.push({ message: t.message, from: from.name });
     seenFrom.add(t.fromId);
   }
   if (uniqueQuotes.length >= 4) break;
 }


 output.innerHTML = `
   <div class="letter-card">
     <div class="letter-dear">${member.name}へ</div>
     <div class="letter-body">
       今月、${uniqueFrom}人のご近所さんから${received.length}回の「ありがとう」が届きました。
       あなたの存在は、このコミュニティにとって、かけがえのないものです。
     </div>
     <div class="letter-quotes">
       ${uniqueQuotes.map(q => `
         <div class="letter-quote">
           「${q.message}」
           <div class="from">— ${q.from}</div>
         </div>
       `).join('')}
     </div>
     <div class="letter-sign">おかげさまより — ${month}月</div>
     <div class="letter-stats">
       <div class="letter-stat">
         <div class="letter-stat-num">${received.length}</div>
         <div class="letter-stat-label">感謝をもらった</div>
       </div>
       <div class="letter-stat">
         <div class="letter-stat-num">${sent.length}</div>
         <div class="letter-stat-label">感謝を送った</div>
       </div>
       <div class="letter-stat">
         <div class="letter-stat-num">${checkins.length}</div>
         <div class="letter-stat-label">参加した回数</div>
       </div>
     </div>
   </div>
 `;
}


// ── INIT ──
async function initApp() {
  const store = await fetchStore();
  buildMembersFromStore(store);
  const today = new Date().toISOString().split('T')[0];
  todayCheckedIn = new Set(storeCache.checkins.filter(c => c.date === today).map(c => c.memberId));
  renderCheckinGrid();
}
initApp();
</script>
